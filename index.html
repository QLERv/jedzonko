<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dla Kochania ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Quicksand',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffe6f2,#fff4f9);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:90%;
max-width:750px;
background:white;
padding:40px;
border-radius:35px;
box-shadow:0 15px 40px rgba(255,105,180,.25);
text-align:center;
position:relative;
z-index:5;
}

.progress{
font-size:14px;
font-weight:700;
color:#ff4f9a;
margin-bottom:15px;
}

.screen{
display:none;
}

.screen.active{
display:block;
}

.emoji{
font-size:85px;
margin-bottom:15px;
}

h1{
color:#ff4f9a;
margin-bottom:20px;
font-size:2.1rem;
}

.subtitle{
color:#666;
font-size:1.15rem;
line-height:1.6;
margin-bottom:25px;
}

button{
border:none;
padding:15px 26px;
margin:8px;
border-radius:999px;
cursor:pointer;
font-size:18px;
font-weight:700;
font-family:inherit;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.yes{
background:#ff5fa2;
color:white;
}

.no{
background:#ffd4e6;
color:#ff4f9a;
}

.back{
background:#ececec;
color:#444;
}

.choice{
display:block;
width:100%;
max-width:350px;
margin:10px auto;
background:#ff5fa2;
color:white;
}

.heart{
position:fixed;
font-size:22px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{

from{
transform:translateY(-100px);
opacity:1;
}

to{
transform:translateY(110vh);
opacity:0;
}

}

#message{
margin-top:15px;
color:#ff4f9a;
font-weight:700;
min-height:30px;
}

</style>

</head>

<body>

<div class="card">

<div id="screen1" class="screen active">

<div class="progress">❤️ Krok 1 z 5</div>

<div class="emoji">🥰</div>

<h1>Kochanie ❤️</h1>

<p class="subtitle">
Czy mnie kochaaasz? 😘
</p>

<button class="yes"
onclick="showScreen('screen2')">
TAK ❤️ (najedź na NIE)
</button>

<button class="no escape">
NIE 😈
</button>

<div id="message"></div>

</div>

<div id="screen2" class="screen">

<div class="progress">❤️ Krok 2 z 5</div>

<div class="emoji">🍕</div>

<h1>Skoro mnie kochasz...</h1>

<p class="subtitle">
To zamawiamy coś na wieczór? 😋
</p>

<button class="yes"
onclick="showScreen('screen3')">
TAK 😍
</button>

<button class="no escape">
NIE 🤨
</button>

<br>

<button class="back"
onclick="showScreen('screen1')">
⬅️ Wróć
</button>

</div>

<div id="screen3" class="screen">

<div class="progress">❤️ Krok 3 z 5</div>

<div class="emoji">🍽️</div>

<h1>Jaką kuchnię wybierasz?</h1>
<button class="choice" onclick="chooseCuisine('Włoska')">🍕 Włoska</button>
<button class="choice" onclick="chooseCuisine('Sushi')">🍣 Sushi</button>
<button class="choice" onclick="chooseCuisine('Burgery')">🍔 Burgery</button>
<button class="choice" onclick="chooseCuisine('Kebab')">🥙 Kebab</button>
<button class="choice" onclick="chooseCuisine('Meksykańska')">🌮 Meksykańska</button>
<button class="choice" onclick="chooseCuisine('Polska')">🥟 Polska</button>
<button class="choice" onclick="chooseCuisine('Chińska')">🥡 Chińska</button>
<button class="choice" onclick="chooseCuisine('Azjatycka')">🍜 Azjatycka</button>
<button class="choice" onclick="chooseCuisine('Kurczak')">🍗 Kurczak i boxy</button>
<button class="choice" onclick="chooseCuisine('StreetFood')">🥪 Street Food</button>
<button class="choice" onclick="chooseCuisine('Czeburki')">🥟 Czeburki</button>
<button class="choice" onclick="chooseCuisine('Deser')">🍰 Deser zamiast kolacji</button>

<br>

<button class="back"
onclick="showScreen('screen2')">
⬅️ Wróć
</button>

</div>

<div id="screen4" class="screen">

<div class="progress">❤️ Krok 4 z 5</div>

<div class="emoji">😋</div>

<h1 id="cuisineTitle"></h1>

<div id="foodOptions"></div>

<br>

<button class="back"
onclick="showScreen('screen3')">
⬅️ Zmień kategorię
</button>

</div>

<div id="screen5" class="screen">

<div class="progress">❤️ Krok 5 z 5</div>

<div class="emoji">🎉❤️🎉</div>

<h1>Świetny wybór!</h1>

<p class="subtitle" id="summary"></p>

<button class="back"
onclick="showScreen('screen3')">
🔄 Wybierz coś innego
</button>

</div>

</div>

<script>

const funnyTexts = [
"Nie oszukujmy się 😘",
"Ta opcja jest niedostępna ❤️",
"Ładna próba 😏",
"NIE zostało wycofane z obiegu 😂",
"Spróbuj jeszcze raz kochanie 🥰",
"To nie działa 😎"
];

document.querySelectorAll(".escape").forEach(btn=>{

function moveButton(){

const x=Math.random()*(window.innerWidth-220);
const y=Math.random()*(window.innerHeight-120);

btn.style.position="fixed";
btn.style.left=x+"px";
btn.style.top=y+"px";

const msg=document.getElementById("message");

if(msg){
msg.innerHTML =
funnyTexts[Math.floor(Math.random()*funnyTexts.length)];
}

}

btn.addEventListener("mouseover",moveButton);
btn.addEventListener("click",moveButton);

});

function showScreen(id){

document.querySelectorAll(".screen").forEach(screen=>{
screen.classList.remove("active");
});

document.getElementById(id).classList.add("active");
}

const foods = {

"Włoska":[
"🍕 Margherita",
"🍕 Pepperoni",
"🍕 Capricciosa",
"🍝 Carbonara",
"🍝 Bolognese",
"🧀 Lasagne",
"🍄 Risotto"
],

"Sushi":[
"🍣 Sushi Mix",
"🍣 Futomaki",
"🍣 Hosomaki",
"🍣 California",
"🐟 Poke Bowl",
"🍱 Bento"
],

"Burgery":[
"🍔 Cheeseburger",
"🍔 Burger BBQ",
"🥓 Burger Bekonowy",
"🍔 Burger Wołowy",
"🧀 Burger Serowy",
"🍟 Burger + Frytki"
],

"Kebab":[
"🥙 Kebab w bułce",
"🌯 Rollo",
"🍟 Kebab Box",
"🥙 Mega Kebab",
"🥙 Kebab mieszany",
"🍗 Kebab z kurczakiem"
],

"Meksykańska":[
"🌮 Taco",
"🌯 Burrito",
"🫓 Quesadilla",
"🥙 Fajita",
"🧀 Nachosy",
"🌶️ Chili con carne"
],

"Polska":[
"🥟 Pierogi ruskie",
"🥟 Pierogi z mięsem",
"🥩 Schabowy",
"🍲 Żurek",
"🥔 Placki ziemniaczane",
"🥬 Gołąbki"
],
  "Chińska":[
"🥡 Kurczak słodko-kwaśny",
"🍚 Ryż smażony",
"🥟 Dim Sum",
"🍤 Krewetki po syczuańsku",
"🍜 Chow Mein",
"🍗 Kurczak Gong Bao"
],

"Azjatycka":[
"🍜 Pad Thai",
"🍜 Ramen",
"🥢 Udon",
"🍤 Tempura",
"🍛 Curry",
"🍚 Fried Rice"
],

"Kurczak":[
"🍗 Stripsy",
"🍗 Hot Wings",
"🍗 Kurczak panierowany",
"🍗 Box Kurczaka",
"🍟 Chicken Box",
"🧀 Chicken Burger"
],

"StreetFood":[
"🥪 Zapiekanka",
"🌭 Hot Dog",
"🥪 Panini",
"🌯 Tortilla",
"🥙 Pita",
"🍟 Frytki Belgijskie"
],

"Czeburki":[
"🥟 Czeburek klasyczny",
"🥟 Czeburek z serem",
"🥟 Czeburek z mięsem",
"🥟 Czeburek mix",
"🥟 Duży czeburek",
"🥟 Czeburek premium"
],

"Deser":[
"🍰 Sernik",
"🍫 Brownie",
"🍨 Lody",
"🧇 Gofry",
"🥞 Naleśniki",
"🍓 Truskawki z bitą śmietaną"
]

};

function chooseCuisine(cuisine){

showScreen("screen4");

document.getElementById("cuisineTitle").innerHTML =
"Wybrałaś: " + cuisine + " ❤️";

let html = "";

foods[cuisine].forEach(food=>{

html += `
<button class="choice"
onclick="finish('${food}')">
${food}
</button>
`;

});

document.getElementById("foodOptions").innerHTML = html;

}

function finish(food){

showScreen("screen5");

document.getElementById("summary").innerHTML = `
Wybrałaś <b>${food}</b> ❤️
<br><br>
Wniosek został rozpatrzony pozytywnie 🥰
<br><br>
Przygotuj się na pyszne jedzonko 😘
`;

for(let i=0;i<120;i++){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML =
Math.random() > 0.5 ? "💖" : "💕";

heart.style.left =
Math.random()*100 + "vw";

heart.style.animationDuration =
(3 + Math.random()*4) + "s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

}

</script>

</body>
</html>
